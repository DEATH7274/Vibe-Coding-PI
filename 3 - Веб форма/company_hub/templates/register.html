{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>📝 Регистрация</h1>
        <form method="POST">
            <div class="form-group"><label>Логин</label><input type="text" name="username" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Пароль</label><input type="password" name="password" required></div>
            <div class="form-group"><label>Повторите пароль</label><input type="password" name="confirm_password" required></div>
            <button type="submit" class="btn btn-primary">Создать аккаунт</button>
        </form>
        <p style="text-align:center;margin-top:15px;">Есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
</div>
{% endblock %}
