<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр 3D Модели</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* Контейнер должен иметь четкие размеры, иначе модель схлопнется в 0 пикселей */
        model-viewer {
            width: 100%;
            height: 600px;
            background-color: #f5f5f5; /* Светло-серый фон для контраста */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Настройка ползунка загрузки (встроен в библиотеку) */
        #default-poster {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-family: sans-serif;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="model-title">Загрузка модели...</h2>

        <model-viewer
            id="my-3d-viewer"
            alt="3D модель пользователя"
            camera-controls
            auto-rotate
            shadow-intensity="1" ar> <div slot="poster" id="default-poster">
                Загрузка 3D...
            </div>
        </model-viewer>
    </div>

</body>
</html>
